name: Bug report
description: Report something that is broken or not working as expected.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: A short description of the problem.
      placeholder: "Zed crashes when opening settings.json"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide a step-by-step list so we can reproduce the issue.
      placeholder: |
        1. Open Zed
        2. Open settings.json
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: zed-version
    attributes:
      label: Zed version
      placeholder: "0.173.2"
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other
  - type: textarea
    id: config
    attributes:
      label: Relevant configuration or logs
      description: Paste any relevant config snippets or logs here.
      render: text

